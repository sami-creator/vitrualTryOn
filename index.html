<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <title>Virtual Try-On</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; background: #111; color: #eee; }
    input, button, textarea { margin: 8px 0; padding: 8px; width: 100%; box-sizing: border-box; background: #222; color: #eee; border: 1px solid #444; }
    button { background: #0070f3; color: white; cursor: pointer; font-size: 16px; }
    img { max-width: 100%; margin-top: 10px; }
    label { font-weight: bold; display: block; margin-top: 12px; }
    #log { margin-top: 16px; font-size: 12px; font-family: monospace; }
    .log-line { padding: 3px 0; border-bottom: 1px solid #333; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <h2>Virtual Try-On</h2>

  <label>صورة الشخص:</label>
  <input type="file" id="person" accept="image/*"/>

  <label>وصف الملابس المطلوبة:</label>
  <textarea id="prompt" rows="3" placeholder="مثال: ارتداء كراكو جزائري تقليدي باللون الأزرق"></textarea>

  <button onclick="run()">تجربة</button>

  <div id="log"></div>
  <img id="result" style="display:none"/>

  <script>
    const API_KEY = "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";

    function log(msg, color) {
      const div = document.createElement("div");
      div.className = "log-line";
      div.style.color = color || "#eee";
      div.textContent = msg;
      document.getElementById("log").appendChild(div);
    }

    async function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function run() {
      const person = document.getElementById("person").files[0];
      const prompt = document.getElementById("prompt").value.trim();
      const result = document.getElementById("result");

      document.getElementById("log").innerHTML = "";
      result.style.display = "none";

      if (!person || !prompt) {
        log("❌ يرجى تحديد الصورة وكتابة وصف الملابس", "red");
        return;
      }

      try {
        log("1. تحويل الصورة إلى base64...", "yellow");
        const base64 = await toBase64(person);
        log("✓ تم - حجم: " + Math.round(base64.length / 1024) + "KB", "lightgreen");

        const payload = {
          model: "qwen/qwen-image-edit",
          messages: [{
            role: "user",
            content: [
              { type: "image_url", image_url: { url: base64 } },
              { type: "text", text: "قم بتعديل هذه الصورة: " + prompt + ". حافظ على نفس الشخص والخلفية وغيّر الملابس فقط." }
            ]
          }],
          max_tokens: 1024,
          temperature: 0.7,
          stream: false
        };

        log("2. إرسال الطلب إلى /api/proxy...", "yellow");
        const res = await fetch("/api/proxy", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
  image: base64.split(",")[1],
  prompt: "قم بتعديل هذه الصورة: " + prompt + ". حافظ على نفس الشخص والخلفية وغيّر الملابس فقط."
})
        });

        log("3. HTTP Status: " + res.status, res.ok ? "lightgreen" : "orange");

        const rawText = await res.text();
        log("4. الرد الخام: " + rawText.slice(0, 800), "lightblue");

        let data;
        try {
          data = JSON.parse(rawText);
        } catch(e) {
          log("❌ الرد ليس JSON: " + rawText.slice(0, 300), "red");
          return;
        }

        if (data.error) {
          log("❌ خطأ من السيرفر: " + JSON.stringify(data.error), "red");
          return;
        }

        if (data.raw) {
          log("⚠️ رد خام من NVIDIA: " + data.raw.slice(0, 800), "orange");
          return;
        }

        const content = data.choices?.[0]?.message?.content;
        log("5. المحتوى: " + JSON.stringify(content).slice(0, 300), "lightblue");

        if (!content) {
          log("❌ لا يوجد محتوى في الرد", "red");
          return;
        }

        if (typeof content === "string" && content.startsWith("data:image")) {
          result.src = content;
          result.style.display = "block";
          log("✅ تمت العملية بنجاح!", "lightgreen");
        } else if (Array.isArray(content)) {
          const imgPart = content.find(p => p.type === "image_url");
          const txtPart = content.find(p => p.type === "text");
          if (imgPart) {
            result.src = imgPart.image_url?.url;
            result.style.display = "block";
            log("✅ تمت العملية بنجاح!", "lightgreen");
          } else if (txtPart) {
            log("رد النموذج (نص): " + txtPart.text, "lightblue");
          } else {
            log("⚠️ محتوى غير معروف: " + JSON.stringify(content), "orange");
          }
        } else {
          log("رد النموذج: " + content, "lightblue");
        }

      } catch(e) {
        log("❌ خطأ: " + e.message, "red");
      }
    }
  </script>
</body>
</html>
